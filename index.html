<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>play.kindl.work</title>
  <style>
    @font-face {
      font-family: 'Krapka';
      src: url('fonts/DRKrapkaRound-FontSize10px.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #09090b;
      font-family: 'Krapka', 'Courier New', monospace;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
      -webkit-user-select: none;
      user-select: none;
    }

    #sketch-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      background: #09090b;
    }

    /* ── Always-visible bottom bar ── */
    #nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 0 0 env(safe-area-inset-bottom, 0);
      z-index: 20;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      pointer-events: none;
    }

    #nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px 12px;
    }

    .nav-btn {
      pointer-events: auto;
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
      font-family: 'Krapka', 'Courier New', monospace;
      font-size: 10px;
      padding: 7px 12px;
      border-radius: 1px;
      -webkit-font-smoothing: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-btn:hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.25);
    }

    .nav-btn:active {
      background: rgba(255,255,255,0.08);
      color: #e4e4e7;
    }

    #nav-center {
      flex: 1;
      text-align: center;
      padding: 0 8px;
      overflow: hidden;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    #nav-hint {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    #nav-title {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #hint {
      position: fixed;
      bottom: 48px;
      left: 0; right: 0;
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      pointer-events: none;
      z-index: 19;
      transition: opacity 1s ease;
    }

    #hint.gone { opacity: 0; }

    /* ── Info panel ── */
    #info-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(9, 9, 11, 0.94);
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
      z-index: 25;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    #info-panel.visible {
      transform: translateY(0);
      pointer-events: auto;
    }

    .info-line {
      font-size: 10px;
      line-height: 1.6;
      color: #e4e4e7;
    }

    .info-label {
      color: rgba(255, 255, 255, 0.3);
    }

    .info-hint {
      margin-top: 8px;
      color: rgba(255,255,255,0.15);
      font-size: 10px;
    }

    #info-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-family: 'Krapka', monospace;
      font-size: 10px;
      cursor: pointer;
      padding: 4px;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      z-index: 5;
      transition: opacity 0.3s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">loading</div>
  <div id="hint">touch to interact · arrows or buttons to navigate</div>
  <iframe id="sketch-frame" allow="camera; microphone; autoplay"></iframe>

  <!-- Always-visible navigation bar -->
  <div id="nav-bar">
    <div id="nav-inner">
      <button class="nav-btn" id="btn-prev">&lt; prev</button>
      <div id="nav-center">
        <span id="nav-hint"></span>
        <span id="nav-title"></span>
      </div>
      <button class="nav-btn" id="btn-info">info</button>
      <button class="nav-btn" id="btn-next">next &gt;</button>
    </div>
  </div>

  <!-- Info panel -->
  <div id="info-panel">
    <button id="info-close">close</button>
    <div class="info-line"><span class="info-label">title </span><span id="info-title"></span></div>
    <div class="info-line"><span class="info-label">date  </span><span id="info-date"></span></div>
    <div class="info-line"><span class="info-label">type  </span><span id="info-category"></span></div>
    <div class="info-line"><span class="info-label">about </span><span id="info-description"></span></div>
    <div class="info-hint">arrows / buttons: prev & next · i: info · g: archive · r: reload</div>
  </div>

  <script>
    let sketches = [];
    let currentIndex = -1;
    let navHistory = [];
    let infoVisible = false;
    let loadId = 0;

    const frame = document.getElementById('sketch-frame');
    const loading = document.getElementById('loading');
    const navTitle = document.getElementById('nav-title');
    const navHint = document.getElementById('nav-hint');
    const infoPanel = document.getElementById('info-panel');

    // ── Load manifest ──
    fetch('sketches.json')
      .then(r => r.json())
      .then(data => {
        sketches = data;
        const params = new URLSearchParams(window.location.search);
        const requested = params.get('sketch');
        if (requested) {
          const idx = sketches.findIndex(s => s.id === requested);
          if (idx !== -1) { loadSketch(idx, params.get('seed')); return; }
        }
        loadRandom();
      })
      .catch(() => { loading.textContent = 'no sketches found'; });

    // ── Core navigation ──
    function loadSketch(index, seed) {
      currentIndex = index;
      const sketch = sketches[index];
      const seedParam = seed || Date.now();
      const thisLoad = ++loadId;

      loading.classList.remove('hidden');
      frame.src = `sketches/${sketch.id}/index.html?seed=${seedParam}&_=${thisLoad}`;

      const countStr = `${String(index + 1).padStart(3, '0')} / ${String(sketches.length).padStart(3, '0')}`;
      navTitle.textContent = `${sketch.title.toLowerCase()}  ${countStr}`;
      navHint.textContent = sketch.description;

      document.getElementById('info-title').textContent = sketch.title;
      document.getElementById('info-date').textContent = sketch.date;
      document.getElementById('info-category').textContent = sketch.category;
      document.getElementById('info-description').textContent = sketch.description;

      const url = new URL(window.location);
      url.searchParams.set('sketch', sketch.id);
      window.history.replaceState({}, '', url);

      navHistory.push(index);
      if (navHistory.length > 50) navHistory.shift();
    }

    function loadRandom() {
      if (sketches.length === 0) return;
      let idx;
      if (sketches.length <= 1) { idx = 0; }
      else {
        let attempts = 0;
        do { idx = Math.floor(Math.random() * sketches.length); attempts++; }
        while (idx === currentIndex && attempts < 20);
      }
      loadSketch(idx);
    }

    function loadNext() {
      if (sketches.length === 0) return;
      loadSketch((currentIndex + 1) % sketches.length);
    }

    function loadPrev() {
      if (sketches.length === 0) return;
      loadSketch((currentIndex - 1 + sketches.length) % sketches.length);
    }

    function toggleInfo() {
      infoVisible = !infoVisible;
      infoPanel.classList.toggle('visible', infoVisible);
    }

    // ── Loading state ──
    window.addEventListener('message', (e) => {
      if (!e.data) return;
      if (e.data.type === 'ready') loading.classList.add('hidden');
      // Forward keyboard events from iframe
      if (e.data.type === 'keydown') handleKey(e.data.key);
    });

    frame.addEventListener('load', () => {
      setTimeout(() => loading.classList.add('hidden'), 2000);
    });

    // ── Button handlers ──
    document.getElementById('btn-next').addEventListener('click', (e) => { e.stopPropagation(); loadNext(); });
    document.getElementById('btn-prev').addEventListener('click', (e) => { e.stopPropagation(); loadPrev(); });
    document.getElementById('btn-info').addEventListener('click', (e) => { e.stopPropagation(); toggleInfo(); });
    document.getElementById('info-close').addEventListener('click', (e) => {
      e.stopPropagation(); infoVisible = false; infoPanel.classList.remove('visible');
    });

    // ── Keyboard (works even when iframe has focus via postMessage forwarding) ──
    function handleKey(key) {
      switch (key) {
        case 'ArrowRight': loadNext(); break;
        case 'ArrowLeft': loadPrev(); break;
        case ' ': loadRandom(); break;
        case 'i': case 'I': toggleInfo(); break;
        case 'g': case 'G': window.location.href = 'archive.html'; break;
        case 'f': case 'F':
          if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
          else document.exitFullscreen();
          break;
        case 'r': case 'R': if (currentIndex >= 0) loadSketch(currentIndex); break;
        case 'Escape': if (infoVisible) { infoVisible = false; infoPanel.classList.remove('visible'); } break;
      }
    }

    // Hide hint after first interaction
    const hint = document.getElementById('hint');
    function hideHint() {
      if (hint && !hint.classList.contains('gone')) hint.classList.add('gone');
    }
    document.addEventListener('click', hideHint, { once: true });
    document.addEventListener('touchstart', hideHint, { once: true });
    document.addEventListener('keydown', hideHint, { once: true });
    setTimeout(hideHint, 10000);

    // Listen on parent document (works when parent has focus)
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight','ArrowLeft',' ','i','I','g','G','f','F','r','R','Escape'].includes(e.key)) {
        e.preventDefault();
        handleKey(e.key);
      }
    });

    // ── Forward touch events to iframe (iOS doesn't deliver touch to iframes reliably) ──
    function forwardTouch(type, e) {
      if (!frame.contentWindow) return;
      const rect = frame.getBoundingClientRect();
      const touches = [];
      const source = e.touches && e.touches.length ? e.touches : e.changedTouches;
      if (!source) return;
      for (let i = 0; i < source.length; i++) {
        touches.push({
          x: source[i].clientX - rect.left,
          y: source[i].clientY - rect.top,
          id: source[i].identifier
        });
      }
      frame.contentWindow.postMessage({ type: 'touch', event: type, touches }, '*');
    }

    // Capture on the iframe element itself
    frame.addEventListener('touchstart', (e) => forwardTouch('start', e), { passive: true });
    frame.addEventListener('touchmove', (e) => forwardTouch('move', e), { passive: true });
    frame.addEventListener('touchend', (e) => forwardTouch('end', e), { passive: true });
    // Also on document for any touches that miss
    document.addEventListener('touchstart', (e) => {
      if (e.target === frame) forwardTouch('start', e);
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
      if (e.target === frame) forwardTouch('move', e);
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (e.target === frame) forwardTouch('end', e);
    }, { passive: true });
  </script>
</body>
</html>
